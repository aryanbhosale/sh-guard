name: Chocolatey

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  chocolatey:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pack and push
        run: |
          cd choco
          choco pack
          choco push sh-guard.*.nupkg --source https://push.chocolatey.org/ --api-key %CHOCO_API_KEY%
        env:
          CHOCO_API_KEY: ${{ secrets.CHOCO_API_KEY }}
        shell: cmd
