name: Chocolatey

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  chocolatey:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pack and push
        run: |
          cd choco
          choco pack
          choco push sh-guard.*.nupkg --source https://push.chocolatey.org/ --api-key ${{ secrets.CHOCO_API_KEY }}
        shell: cmd
