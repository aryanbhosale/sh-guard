name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --bin sh-guard --bin sh-guard-mcp
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/sh-guard dist/
          cp target/${{ matrix.target }}/release/sh-guard-mcp dist/
          cd dist && tar czf sh-guard-${{ matrix.target }}.tar.gz sh-guard sh-guard-mcp
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/sh-guard.exe dist/
          cp target/${{ matrix.target }}/release/sh-guard-mcp.exe dist/
          cd dist && tar czf sh-guard-${{ matrix.target }}.tar.gz sh-guard.exe sh-guard-mcp.exe
      - name: Package zip (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path dist/sh-guard.exe, dist/sh-guard-mcp.exe -DestinationPath dist/sh-guard-${{ matrix.target }}.zip
      - uses: actions/upload-artifact@v4
        with:
          name: sh-guard-${{ matrix.target }}
          path: |
            dist/sh-guard-${{ matrix.target }}.tar.gz
            dist/sh-guard-${{ matrix.target }}.zip

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*/*.tar.gz
            artifacts/*/*.zip
          generate_release_notes: true
