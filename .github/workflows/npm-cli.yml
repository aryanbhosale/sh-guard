name: npm CLI packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            npm_pkg: sh-guard-cli-linux-x64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            npm_pkg: sh-guard-cli-linux-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            npm_pkg: sh-guard-cli-darwin-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            npm_pkg: sh-guard-cli-darwin-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            npm_pkg: sh-guard-cli-win32-x64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --bin sh-guard
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Copy binary (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p npm/${{ matrix.npm_pkg }}/bin
          cp target/${{ matrix.target }}/release/sh-guard npm/${{ matrix.npm_pkg }}/bin/

      - name: Copy binary (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p npm/${{ matrix.npm_pkg }}/bin
          cp target/${{ matrix.target }}/release/sh-guard.exe npm/${{ matrix.npm_pkg }}/bin/

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.npm_pkg }}
          path: npm/${{ matrix.npm_pkg }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Copy platform packages
        run: |
          for pkg in sh-guard-cli-darwin-arm64 sh-guard-cli-darwin-x64 sh-guard-cli-linux-arm64 sh-guard-cli-linux-x64 sh-guard-cli-win32-x64; do
            cp -r artifacts/$pkg/* npm/$pkg/
          done

      - name: Publish platform packages
        run: |
          for pkg in sh-guard-cli-darwin-arm64 sh-guard-cli-darwin-x64 sh-guard-cli-linux-arm64 sh-guard-cli-linux-x64 sh-guard-cli-win32-x64; do
            cd npm/$pkg
            npm publish --access public
            cd ../..
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish main package
        run: |
          cd npm/sh-guard
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
